<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="SAVI" />
<meta name="theme-color" content="#0A0614" />
<title>SAVI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0614;
    --bg-2: #120A20;
    --bg-3: #1A0B3D;
    --surface: #1E1433;
    --surface-2: #241B40;
    --aubergine: #2B0F5C;
    --lavender: #A78BFA;
    --lavender-soft: #C4B5FD;
    --lavender-deep: #8B5CF6;
    --plum: #6D28D9;
    --plum-deep: #4C1D95;
    --chartreuse: #D8FF3C;
    --butter: #FFE066;
    --cream: #F5F0E4;
    --soft-on-dark: rgba(245,240,228,0.7);
    --muted-on-dark: rgba(245,240,228,0.45);
    --line-on-dark: rgba(245,240,228,0.1);
    --paper: var(--bg);
    --paper-dim: var(--bg-2);
    --ink: var(--cream);
    --ink-soft: var(--soft-on-dark);
    --ink-mute: var(--muted-on-dark);
    --line: var(--line-on-dark);
    --line-soft: rgba(245,240,228,0.06);
    --card: var(--surface);
    --accent: var(--lavender);
    --paper-nav: rgba(10, 6, 20, 0.94);
    --paper-fade: rgba(10, 6, 20, 0.92);
    --paper-clear: rgba(10, 6, 20, 0);
    --navigator-height: 88px;
    --navigator-offset: calc(var(--navigator-height) + env(safe-area-inset-bottom));
  }
  :root[data-theme="light"] {
    --paper: #FAF8F4;
    --paper-dim: #F2ECF8;
    --ink: #140823;
    --ink-soft: #5B4A7A;
    --ink-mute: #8A7CA8;
    --line: rgba(20, 8, 35, 0.14);
    --line-soft: rgba(20, 8, 35, 0.08);
    --card: #FFFFFF;
    --accent: #8B5CF6;
    --paper-nav: rgba(250, 248, 244, 0.96);
    --paper-fade: rgba(250, 248, 244, 0.94);
    --paper-clear: rgba(250, 248, 244, 0);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  html, body { margin: 0; padding: 0; overflow: hidden; background: var(--paper); color: var(--ink); font-family: "Inter", "SF Pro Text", "Avenir Next", system-ui, -apple-system, sans-serif; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
  body {
    height: 100%;
  }
  .serif { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.018em; }
  .serif-italic { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; letter-spacing: -0.02em; }
  .mono { font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Monaco, Consolas, monospace; }

  /* App container — fullscreen on mobile, phone-frame on desktop */
  .stage { height: 100dvh; min-height: 100dvh; display: flex; align-items: stretch; justify-content: center; background: var(--paper); overflow: hidden; }
  @media (min-width: 500px) {
    .stage {
      align-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(167,139,250,0.18) 0%, rgba(167,139,250,0) 28%),
        linear-gradient(180deg, #0A0614 0%, #120A20 42%, #1A0B3D 100%);
    }
    :root[data-theme="light"] .stage {
      background:
        radial-gradient(circle at top left, rgba(167,139,250,0.14) 0%, rgba(167,139,250,0) 28%),
        linear-gradient(180deg, #F7F2FF 0%, #EEE4FA 100%);
    }
    .frame-wrap { width: min(480px, calc(100vw - 64px)); height: min(900px, calc(100dvh - 64px)); position: relative; }
    .bezel { position: absolute; inset: 0; border-radius: 34px; padding: 0; background: transparent; box-shadow: 0 36px 80px -30px rgba(60,50,40,0.38); }
    .bezel-inner { width: 100%; height: 100%; border-radius: 34px; padding: 0; background: transparent; }
    .screen { width: 100%; height: 100%; border-radius: 34px; overflow: hidden; position: relative; background: var(--paper); border: 1px solid rgba(255,255,255,0.55); }
    .notch { display: none; }
  }
  @media (max-width: 499px) {
    .frame-wrap { width: 100%; height: 100dvh; min-height: 100dvh; }
    .bezel, .bezel-inner { all: unset; display: block; width: 100%; height: 100dvh; min-height: 100dvh; }
    .screen { width: 100%; height: 100dvh; min-height: 100dvh; background: var(--paper); position: relative; overflow: hidden; padding-top: env(safe-area-inset-top); }
    .notch { display: none; }
  }

  .app { display: flex; flex-direction: column; height: 100%; min-height: 0; overflow: hidden; position: relative; }
  @media (min-width: 500px) { .app { height: 100%; min-height: 0; } }
  .app-main { flex: 1; min-height: 0; position: relative; overflow: hidden; padding-bottom: var(--navigator-offset); }
  .navigator-shell { position: absolute; left: 0; right: 0; bottom: 0; z-index: 30; pointer-events: none; }
  .navigator-shell > * { pointer-events: auto; box-shadow: 0 -12px 24px -22px rgba(28,26,23,0.45); }
  @media (max-width: 499px) {
    .navigator-shell { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; }
  }
  /* Scroll areas */
  .scroll { overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex: 1; }
  .scroll::-webkit-scrollbar { display: none; }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  button:active { transform: scale(0.985); }
  input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  button, a, input, textarea { transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease, background-color 140ms ease, opacity 140ms ease; }
  button:disabled, input:disabled, textarea:disabled { cursor: not-allowed; }
  input:focus, textarea:focus { outline: none; border-color: var(--ink) !important; }
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 3px solid rgba(200, 85, 61, 0.22);
    outline-offset: 2px;
  }
  @media (hover: hover) {
    button:hover:not(:disabled), a:hover {
      box-shadow: 0 12px 20px -18px rgba(28,26,23,0.5);
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
  }

  /* Animations */
  @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes wizard-glow { 0%, 100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.06); opacity: 1; } }
  @keyframes gentle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes dot-bounce { 0%, 80%, 100% { opacity: 0.28; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-2px); } }
  .anim-slide { animation: slide-up 0.35s ease-out forwards; opacity: 0; }
  .anim-fade { animation: fade-in 0.25s ease-out forwards; }
  .anim-sheet { animation: sheet-up 0.35s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; }
  .wizard-float { animation: gentle-float 1.6s ease-in-out infinite; }
  .wizard-glow { animation: wizard-glow 3.8s ease-in-out infinite; }
  .loading-dots { display: inline-flex; align-items: center; gap: 3px; margin-left: 4px; vertical-align: middle; }
  .loading-dots span { width: 4px; height: 4px; border-radius: 999px; background: currentColor; animation: dot-bounce 1s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  /* Utility */
  .clamp2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>
